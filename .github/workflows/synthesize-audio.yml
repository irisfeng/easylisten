name: 补生成语音

# 手动触发:为所有还没有音频或只生成了一部分的听稿补齐神经语音。
on:
  workflow_dispatch:
    inputs:
      model:
        description: "可选：修复既有半成品时指定原型号，默认 speech-2.8-hd"
        required: false
        type: string

permissions:
  contents: write

jobs:
  synthesize:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 校验朗读文本规则
        run: npm run test:speech

      # 整篇拼接的句级时间轴用 ffprobe 量时长(跑机不自带)
      - name: 安装 ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 预生成神经语音
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_TTS_MODEL: ${{ inputs.model || vars.MINIMAX_TTS_MODEL }}
        run: node scripts/synthesize.mjs

      - name: 提交音频
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "easylisten-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/audio
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: 补生成听稿语音"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          pushed=""
          for i in 1 2 3; do
            git push "$REMOTE" "HEAD:${GITHUB_REF_NAME}" && { pushed=1; break; }
            echo "push 失败,变基重试 ($i/3)"
            git pull --rebase "$REMOTE" "${GITHUB_REF_NAME}"
            sleep 5
          done
          [ -n "$pushed" ] || { echo "三次推送均失败"; exit 1; }
