name: 每日精选

on:
  schedule:
    # UTC 22:00 = 北京时间早 6:00,日刊在早高峰前就绪
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 设定北京日期
        run: echo "ISSUE_DATE=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 召回候选
        run: node scripts/ingest.mjs

      - name: 评分与听稿改写
        # 三个模型 key 任配其一即可(DeepSeek 或阿里百炼);未配的留空,脚本自动挑选
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          ISSUE_DATE: ${{ env.ISSUE_DATE }}
        run: node scripts/curate.mjs

      - name: 预生成神经语音
        run: node scripts/synthesize.mjs

      - name: 提交今日日刊
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "easylisten-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/daily.json content/editorial.json public/audio
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: 每日精选 ${ISSUE_DATE}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          pushed=""
          for i in 1 2 3; do
            git push "$REMOTE" "HEAD:${GITHUB_REF_NAME}" && { pushed=1; break; }
            echo "push 失败,变基重试 ($i/3)"
            git pull --rebase "$REMOTE" "${GITHUB_REF_NAME}"
            sleep 5
          done
          [ -n "$pushed" ] || { echo "三次推送均失败"; exit 1; }

      # 任何一步失败都自动开 issue 告警,仓库所有者会收到 GitHub 通知,
      # 避免定时任务失败无人知晓、日刊静默断更
      - name: 失败告警
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create -R "$GITHUB_REPOSITORY" \
            --title "⚠️ 每日精选 ${ISSUE_DATE:-未知日期} 出刊失败" \
            --body "定时出刊任务失败,今天的日刊没有发出。运行日志:${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
