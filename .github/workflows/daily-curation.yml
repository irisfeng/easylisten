name: 每日精选

on:
  schedule:
    # UTC 22:00 = 北京时间早 6:00,日刊在早高峰前就绪
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 设定北京日期
        run: echo "ISSUE_DATE=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 召回候选
        run: node scripts/ingest.mjs

      - name: 评分与听稿改写
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_DATE: ${{ env.ISSUE_DATE }}
        run: node scripts/curate.mjs

      - name: 预生成神经语音
        run: node scripts/synthesize.mjs

      - name: 提交今日日刊
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "easylisten-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/daily.json content/candidates.json public/audio
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: 每日精选 ${ISSUE_DATE}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          for i in 1 2 3; do
            git push "$REMOTE" "HEAD:${GITHUB_REF_NAME}" && break
            echo "push 失败,变基重试 ($i/3)"
            git pull --rebase "$REMOTE" "${GITHUB_REF_NAME}"
            sleep 5
          done
