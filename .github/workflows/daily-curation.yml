name: 每日精选

on:
  schedule:
    # 避开 GitHub Actions 每个整点的调度高峰。主任务北京时间 05:17 开始，
    # 06:17 再兜底一次；当天已出刊时成本闸门会立即退出，不重复调用付费模型。
    - cron: "17 21 * * *"
    - cron: "17 22 * * *"
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "强制重做当天内容（会重新调用付费模型）"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

# 若主任务被 GitHub 延迟到兜底窗口，两个任务按顺序执行，避免并发重复计费。
concurrency:
  group: daily-curation
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # 兜底任务若排队，启动时读取主任务刚提交的最新日刊，成本闸门才能生效。
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: 设定北京日期
        run: echo "ISSUE_DATE=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_ENV"

      - name: 成本闸门
        id: cost_guard
        env:
          FORCE_REGENERATE: ${{ inputs.force_regenerate || 'false' }}
        run: node scripts/check-daily-run.mjs

      - uses: actions/setup-node@v4
        if: steps.cost_guard.outputs.should_run == 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.cost_guard.outputs.should_run == 'true'

      - name: 校验朗读文本规则
        if: steps.cost_guard.outputs.should_run == 'true'
        run: npm run test:speech

      - name: 校验内容源与编排策略
        if: steps.cost_guard.outputs.should_run == 'true'
        run: npm run test:curation

      - name: 召回候选
        if: steps.cost_guard.outputs.should_run == 'true'
        run: node scripts/ingest.mjs

      - name: 评分与听稿改写
        if: steps.cost_guard.outputs.should_run == 'true'
        # 三个模型 key 任配其一即可(DeepSeek 或阿里百炼);未配的留空,脚本自动挑选
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          ISSUE_DATE: ${{ env.ISSUE_DATE }}
        run: node scripts/curate.mjs

      - name: 按需生成编辑缩略图
        if: steps.cost_guard.outputs.should_run == 'true'
        # 最多两张且允许零张；生图服务失败不影响当天内容与语音出刊
        continue-on-error: true
        timeout-minutes: 8
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ARK_IMAGE_MODEL: ${{ vars.ARK_IMAGE_MODEL }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_IMAGE_MODEL: ${{ vars.DASHSCOPE_IMAGE_MODEL }}
          DASHSCOPE_IMAGE_BASE_URL: ${{ vars.DASHSCOPE_IMAGE_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          IMAGE_SELECTOR_MODEL: ${{ vars.IMAGE_SELECTOR_MODEL }}
          ISSUE_DATE: ${{ env.ISSUE_DATE }}
          ARK_MAX_IMAGES_PER_RUN: ${{ vars.ARK_MAX_IMAGES_PER_RUN }}
        run: node scripts/generate-editorial-images.mjs

      # 整篇拼接的句级时间轴用 ffprobe 量时长(跑机不自带)
      - name: 安装 ffmpeg
        if: steps.cost_guard.outputs.should_run == 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 预生成神经语音
        if: steps.cost_guard.outputs.should_run == 'true'
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_TTS_MODEL: ${{ vars.MINIMAX_TTS_MODEL }}
          MINIMAX_MAX_CHARS_PER_RUN: ${{ vars.MINIMAX_MAX_CHARS_PER_RUN || '12000' }}
          REQUIRE_DUAL_VOICE: "true"
        run: node scripts/synthesize.mjs

      - name: 提交今日日刊
        if: steps.cost_guard.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "easylisten-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content/daily.json content/editorial.json public/audio public/editorial
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: 每日精选 ${ISSUE_DATE}"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          pushed=""
          for i in 1 2 3; do
            git push "$REMOTE" "HEAD:${GITHUB_REF_NAME}" && { pushed=1; break; }
            echo "push 失败,变基重试 ($i/3)"
            git pull --rebase "$REMOTE" "${GITHUB_REF_NAME}"
            sleep 5
          done
          [ -n "$pushed" ] || { echo "三次推送均失败"; exit 1; }

      # 任何一步失败都自动开 issue 告警,仓库所有者会收到 GitHub 通知,
      # 避免定时任务失败无人知晓、日刊静默断更
      - name: 失败告警
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create -R "$GITHUB_REPOSITORY" \
            --title "⚠️ 每日精选 ${ISSUE_DATE:-未知日期} 出刊失败" \
            --body "定时出刊任务失败,今天的日刊没有发出。运行日志:${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
