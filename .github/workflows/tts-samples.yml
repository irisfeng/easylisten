name: 音色小样

# 手动触发:用同一段听稿把各家 TTS 合成为匿名小样,发布到站点 /tts-samples/
# 供盲听选型。"样品编号 → 服务商/音色"对照表只出现在本工作流日志里。
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  samples:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 合成小样
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          STEPFUN_API_KEYS: ${{ secrets.STEPFUN_API_KEYS }}
          VOLC_API_KEY: ${{ secrets.VOLC_API_KEY }}
        run: node scripts/tts-samples.mjs

      - name: 提交小样
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "easylisten-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/tts-samples
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: 音色盲选小样"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          pushed=""
          for i in 1 2 3; do
            git push "$REMOTE" "HEAD:${GITHUB_REF_NAME}" && { pushed=1; break; }
            echo "push 失败,变基重试 ($i/3)"
            git pull --rebase "$REMOTE" "${GITHUB_REF_NAME}"
            sleep 5
          done
          [ -n "$pushed" ] || { echo "三次推送均失败"; exit 1; }
