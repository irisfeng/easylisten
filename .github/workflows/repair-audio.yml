name: 已审核稿件音频修复

on:
  workflow_dispatch:
    inputs:
      slugs:
        description: "已审核稿件 slug，多个用英文逗号分隔"
        required: true
        type: string
      force_regenerate:
        description: "同时重做已有男女声；关闭时只补缺失声线"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: repair-reviewed-audio
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 安装 ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: 生成或补齐指定中文男女声
        env:
          TARGET_AUDIO_SLUGS: ${{ inputs.slugs }}
          FORCE_TARGET_AUDIO: ${{ inputs.force_regenerate }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_TTS_MODEL: ${{ vars.MINIMAX_TTS_MODEL }}
          MINIMAX_MAX_CHARS_PER_RUN: "12000"
          REQUIRE_DUAL_VOICE: "true"
        run: node scripts/synthesize.mjs

      - name: 提交音频
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "easylisten-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/audio
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "fix: 重生成已审核稿件音频"
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push "$REMOTE" "HEAD:${GITHUB_REF_NAME}"
